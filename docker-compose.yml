# Dev local: só infra (Postgres + Redis). App roda fora do Docker via pnpm dev.
# Pra full stack self-hosted, use docker-compose.prod.yml

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contextos_postgres
    environment:
      POSTGRES_USER: contextos
      POSTGRES_PASSWORD: contextos_dev
      POSTGRES_DB: contextos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextos"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: contextos_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
